name: city_fix_manager
description: "Panel de administración para City Fix"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  provider: ^6.0.5
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  intl: ^0.18.1
  video_player: ^2.11.1
